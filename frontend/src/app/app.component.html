<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600&family=Source+Sans+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap"
    rel="stylesheet">
</head>
<body>
<div class="main__block">
  <header class="header">
    <div class="logo__block">
      <a href="#">
        <img src="assets/images/icon/open-book.svg" class="logo">
      </a>
    </div>
    <ul class="genre__block">
      <li class="genre--item"><a href="#">Фантастика</a></li>
      <li class="genre--item"><a href="#">Романы</a></li>
      <li class="genre--item"><a href="#">Хороры</a></li>
      <li class="genre--item"><a href="#">Приключения</a></li>
    </ul>
    <div class="user__block">
      <a href="#">
        <img class="user--icon" id="search" src="assets/images/icon/search.svg">
      </a>
      <a href="#">
        <img class="user--icon" src="assets/images/icon/like.svg">
      </a>
      <a href="#">
        <img class="user--icon" src="assets/images/icon/user.svg">
      </a>
    </div>
  </header>

  <section class="conent__section">
    <div class="content-grid__block">
      <app-book-card *ngFor="let book of books"
      [element]="book"
      ></app-book-card>
    </div>
  </section>
</div>
</body>
</html>
