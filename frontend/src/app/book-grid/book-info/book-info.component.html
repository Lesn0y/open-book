<div class="book__grid">
  <div class="book__block--thumbnail" [ngStyle]="
  {backgroundImage: 'url(&quot;' + book.gallery[0] + '&quot;)'}">
  </div>
  <div class="book--intro">
    <p class="book--title">{{book.book_name}}</p>
    <p class="book--author">{{book.author}}</p>
    <p class="book--subtitle">{{book.subtitle}}</p>
  </div>
  <div class="book__section-info">
    <div class="book--info">
      <div class="book-info-left">
        <app-book-gallery [gallery]="book.gallery"></app-book-gallery>
      </div>

      <div class="book-info-right">
        <p class="book--description">
          {{book.description}}
        </p>
        <p class="book--page-count">
          <span class="book--quality">Количество страниц: </span>{{book.page_count}}
        </p>
        <p class="book--raiting">
          <span class="book--quality">Рейтинг: </span>{{book.rating}}
        </p>
      </div>

    </div>
  </div>
</div>
